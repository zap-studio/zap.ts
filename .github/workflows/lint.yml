name: Lint

on:
  pull_request:
    branches: ["**"]

permissions:
  contents: read

jobs:
  lint-monorepo:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Setup Biome
        uses: biomejs/setup-biome@v2.6.0
        with:
          version: latest

      - name: Setup bun
        uses: oven-sh/setup-bun@v2.0.2

      - name: Setup Node.js
        uses: actions/setup-node@v4.4.0
        with:
          node-version: 24.2.0

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run linter on the monorepo
        run: bun run lint

  lint-template:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Setup Biome
        uses: biomejs/setup-biome@v2.6.0
        with:
          version: latest

      - name: Setup bun
        uses: oven-sh/setup-bun@v2.0.2

      - name: Setup Node.js
        uses: actions/setup-node@v4.4.0
        with:
          node-version: 24.2.0

      - name: Install template deps
        working-directory: template
        run: bun install --frozen-lockfile

      - name: Run linter in template
        working-directory: template
        run: bun run lint